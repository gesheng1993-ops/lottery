<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>逃跑抄手 · 中奖名单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f4f7fc;color:#3e2723;min-height:100vh}
.page{max-width:500px;margin:0 auto;padding:0 0 30px}

.header{background:linear-gradient(135deg,#0D47A1,#1565C0);padding:20px;text-align:center;position:relative}
.header .back{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#fff;font-size:14px;text-decoration:none;opacity:.8}
.header .brand{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:4px}
.header h1{font-size:20px;color:#fff;font-weight:700;margin:4px 0}
.header .sub{font-size:12px;color:rgba(255,255,255,.8)}

.date-badge{text-align:center;margin:12px 0}
.date-badge span{display:inline-block;background:#fff;border:1px solid #e0d5cc;border-radius:20px;padding:6px 18px;font-size:12px;color:#8d6e63}

.winners-list{padding:0 16px}
.winner-item{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.03)}
.winner-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.winner-icon.gold{background:#FFF8E1}
.winner-icon.silver{background:#FFFDE7}
.winner-info{flex:1;min-width:0}
.winner-info .name{font-size:14px;font-weight:600;color:#4e342e}
.winner-info .prize{font-size:13px;color:#1565C0;font-weight:500}
.winner-time{font-size:11px;color:#bcaaa4;flex-shrink:0}

.empty-state{text-align:center;padding:60px 20px;color:#bcaaa4}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

.bottom-link{text-align:center;margin:20px 0}
.bottom-link a{display:inline-block;padding:10px 28px;background:#1565C0;color:#fff;border-radius:20px;font-size:14px;font-weight:600;text-decoration:none}
.bottom-link a:active{opacity:.85}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <a class="back" href="/game">&larr; 返回抽奖</a>
    <div class="brand">· 逃跑抄手 ·</div>
    <h1>🏆 今日中奖名单</h1>
    <div class="sub">恭喜今天所有中奖的幸运儿</div>
  </div>

  <div class="date-badge">
    <span id="todayDate"></span>
  </div>

  <div class="winners-list" id="winnersList">
    <div class="empty-state">
      <div class="icon">🎰</div>
      <p>加载中...</p>
    </div>
  </div>

  <div class="bottom-link">
    <a href="/game">去抽奖试试手气</a>
  </div>
</div>

<script>
(function(){
  var d = new Date();
  var week = ['日','一','二','三','四','五','六'];
  document.getElementById('todayDate').textContent =
    d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 · 星期' + week[d.getDay()];

  fetch('/api/winners')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var container = document.getElementById('winnersList');
      if (data.code !== 0 || !data.data.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🎰</div><p>今天还没有人中奖，快来试试吧~</p></div>';
        return;
      }
      var html = '';
      data.data.forEach(function(w, i){
        var iconClass = w.prize_name.indexOf('20') >= 0 ? 'gold' : 'silver';
        var iconEmoji = w.prize_name.indexOf('20') >= 0 ? '🎉' : '🍲';
        var t = new Date(w.time);
        var timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
        html += '<div class="winner-item">' +
          '<div class="winner-icon ' + iconClass + '">' + iconEmoji + '</div>' +
          '<div class="winner-info">' +
            '<div class="name">用户 ' + w.user_id + '</div>' +
            '<div class="prize">' + w.prize_name + '</div>' +
          '</div>' +
          '<div class="winner-time">' + timeStr + '</div>' +
        '</div>';
      });
      container.innerHTML = html;
    })
    .catch(function(){
      document.getElementById('winnersList').innerHTML = '<div class="empty-state"><div class="icon">😅</div><p>加载失败，请刷新重试</p></div>';
    });
})();
</script>
</body>
</html>
