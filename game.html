<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>逃跑抄手 · 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f4f7fc;color:#3e2723;min-height:100vh;overflow-x:hidden}
.page{max-width:500px;margin:0 auto;padding:0 0 30px}

.header{background:linear-gradient(135deg,#0D47A1,#1565C0);padding:20px;text-align:center;position:relative}
.header .back{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#fff;font-size:14px;text-decoration:none;opacity:.8}
.header .brand{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:4px}
.header h1{font-size:20px;color:#fff;font-weight:700;margin:4px 0}
.header .sub{font-size:12px;color:rgba(255,255,255,.8)}

.status-bar{display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin:16px 0 12px;font-size:13px;color:#8d6e63}
.status-bar .count{font-weight:600;color:#1565C0}

.wheel-container{position:relative;width:360px;height:360px;margin:0 auto 20px}
.wheel-container canvas{width:100%;height:100%}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:32px;z-index:2;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
.wheel-btn{display:block;width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,#1E88E5,#1565C0);color:#fff;font-size:16px;font-weight:700;border:4px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.2);cursor:pointer;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3}
.wheel-btn:active{transform:translate(-50%,-50%) scale(.95)}
.wheel-btn.disabled{opacity:.6;pointer-events:none}

.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.result-overlay.hidden{display:none}
.result-box{background:#fff;border-radius:20px;padding:32px 24px 24px;width:100%;max-width:320px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.result-box.win{border:3px solid #FFD700}
.result-icon{font-size:56px;margin-bottom:8px}
.result-title{font-size:20px;font-weight:700;margin-bottom:4px}
.result-title.win{color:#1565C0}
.result-title.lose{color:#8d6e63}
.result-desc{font-size:13px;color:#8d6e63;margin-bottom:16px;line-height:1.6}
.result-btn{display:inline-block;padding:10px 32px;border:none;border-radius:20px;background:#1565C0;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin:4px}
.result-btn.outline{background:#fff;color:#1565C0;border:1px solid #1565C0}
.result-btn:active{opacity:.85}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

.rules{background:#fff;border-radius:12px;margin:16px;padding:16px;font-size:12px;color:#8d6e63;line-height:1.8}
.rules h3{font-size:13px;color:#4e342e;margin-bottom:4px}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <a class="back" href="/">&larr; 返回</a>
    <div class="brand">· 逃跑抄手 ·</div>
    <h1>🎉 幸运大转盘</h1>
    <div class="sub">每日限量奖品 · 先到先得</div>
  </div>

  <div class="date-badge" style="text-align:center;margin:12px 0 4px">
    <span id="gameDate" style="display:inline-block;background:#fff;border:1px solid #e0d5cc;border-radius:20px;padding:6px 18px;font-size:12px;color:#8d6e63"></span>
  </div>

  <div class="status-bar">
    <span>今日剩余：<span class="count" id="remainCount">--</span> 次</span>
    <span id="poolHint" style="font-size:11px"></span>
  </div>

  <div id="wheelSection">
    <div class="wheel-container">
      <div class="wheel-pointer">📍</div>
      <canvas id="wheelCanvas" width="720" height="720"></canvas>
      <button class="wheel-btn" id="wheelBtn" onclick="spinWheel()">抽奖</button>
    </div>
  </div>

  <div class="rules">
    <h3>📋 活动规则</h3>
    1. 每日可参与 <strong>1次</strong> 抽奖<br>
    2. 奖品每日限量，先到先得<br>
    3. 中奖后<strong>3天内</strong>有效，到店出示即可使用<br>
    4. 最终解释权归逃跑抄手所有
  </div>
</div>

<div class="result-overlay hidden" id="resultOverlay">
  <div class="result-box" id="resultBox">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="result-btn" onclick="closeResult()">知道了</button>
  </div>
</div>

<script>
var STATE = {
  userId: '',
  poolStatus: null,
  userDrawCount: 0,
  maxDraws: 1,
  isDrawing: false
};

// 转盘扇区：1个20元券、2个小菜、5个谢谢参与
var SEG_COLORS = ['#FF4444','#FFD700','#FFD700','#e0d5cc','#f0f0f0','#e0d5cc','#f0f0f0','#e0d5cc'];
var SEG_LABELS  = ['20元券','小菜','小菜','谢谢参与','谢谢参与','谢谢参与','谢谢参与','谢谢参与'];

function init(){
  var params = new URLSearchParams(window.location.search);
  STATE.userId = params.get('uid') || localStorage.getItem('_luid') || '';

  if (!STATE.userId) {
    window.location.href = '/';
    return;
  }

  var d = new Date();
  var week = ['日','一','二','三','四','五','六'];
  document.getElementById('gameDate').textContent =
    d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 · 星期' + week[d.getDay()];

  drawWheel();
  loadStatus();
}

function loadStatus(){
  Promise.all([
    fetch('/api/pool-status').then(function(r){return r.json()}),
    fetch('/api/user-status?user_id=' + encodeURIComponent(STATE.userId)).then(function(r){return r.json()})
  ]).then(function(results){
    if (results[0].code === 0) STATE.poolStatus = results[0].data;
    if (results[1].code === 0) {
      STATE.userDrawCount = results[1].data.draw_count;
      STATE.maxDraws = results[1].data.max_draws;
    }
    updateUI();
  }).catch(function(e){
    console.error('Status error:', e);
  });
}

function updateUI(){
  var remaining = Math.max(0, STATE.maxDraws - STATE.userDrawCount);
  document.getElementById('remainCount').textContent = remaining;
  var hintEl = document.getElementById('poolHint');
  if (STATE.poolStatus && !STATE.poolStatus.has_prizes) {
    hintEl.textContent = '今日奖品已抽完';
    hintEl.style.color = '#ef4444';
  } else {
    hintEl.textContent = '奖品还有剩余';
    hintEl.style.color = '#10b981';
  }
  var btn = document.getElementById('wheelBtn');
  if (remaining <= 0) {
    btn.classList.add('disabled');
    btn.textContent = '已用完';
  } else {
    btn.classList.remove('disabled');
    btn.textContent = '抽奖';
  }
}

var wheelAngle = 0;

function drawWheel(){
  var canvas = document.getElementById('wheelCanvas');
  var ctx = canvas.getContext('2d');
  var cx = 360, cy = 360, r = 340;
  var segments = 8;
  var arcSize = (2 * Math.PI) / segments;
  ctx.clearRect(0, 0, 720, 720);
  for (var i = 0; i < segments; i++) {
    var startAngle = i * arcSize;
    var endAngle = startAngle + arcSize;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.fillStyle = SEG_COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arcSize / 2);
    ctx.textAlign = 'center';
    ctx.fillStyle = i < 3 ? '#fff' : '#8d6e63';
    ctx.font = i < 3 ? 'bold 30px "PingFang SC","Microsoft YaHei",sans-serif' : '24px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(SEG_LABELS[i], 210, 10);
    ctx.restore();
  }
  var grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 70);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, '#f5f5f5');
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, 2 * Math.PI);
  ctx.fillStyle = grad;
  ctx.fill();
}

function spinWheel(){
  if (STATE.isDrawing) return;
  var remaining = Math.max(0, STATE.maxDraws - STATE.userDrawCount);
  if (remaining <= 0) {
    showToast('今日抽奖次数已用完');
    return;
  }

  STATE.isDrawing = true;
  var btn = document.getElementById('wheelBtn');
  btn.classList.add('disabled');
  btn.textContent = '...';

  fetch('/api/draw?user_id=' + encodeURIComponent(STATE.userId))
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.code === 429) {
      showToast(data.message);
      STATE.isDrawing = false;
      loadStatus();
      return;
    }
    if (data.code !== 0) {
      showToast(data.message || '抽奖失败');
      STATE.isDrawing = false;
      loadStatus();
      return;
    }

    var result = data.data;
    var targetIdx;
    if (result.won && result.prize.level === 1) targetIdx = 0;       // 20元券
    else if (result.won && result.prize.level === 2) targetIdx = 1 + Math.floor(Math.random() * 2);  // 小菜
    else targetIdx = 3 + Math.floor(Math.random() * 5);              // 谢谢参与

    var targetAngle = targetIdx * (Math.PI / 4) + (Math.PI / 8);
    var totalRotation = (Math.PI * 2 * 5) + (Math.PI * 2 - targetAngle);

    animateWheel(totalRotation, function(){
      STATE.isDrawing = false;
      STATE.userDrawCount++;
      updateUI();
      showResult(result);
    });
  })
  .catch(function(e){
    showToast('网络错误，请重试');
    STATE.isDrawing = false;
    loadStatus();
  });
}

function animateWheel(totalRotation, callback){
  var canvas = document.getElementById('wheelCanvas');
  var startAngle = wheelAngle;
  var duration = 4000;
  var startTime = null;

  function step(timestamp){
    if (!startTime) startTime = timestamp;
    var elapsed = timestamp - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 4);
    var angle = startAngle + totalRotation * eased;
    wheelAngle = angle;
    canvas.style.transform = 'rotate(' + angle + 'rad)';
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      wheelAngle = angle % (Math.PI * 2);
      canvas.style.transform = 'rotate(' + wheelAngle + 'rad)';
      if (callback) callback();
    }
  }
  requestAnimationFrame(step);
}

function showResult(result){
  var overlay = document.getElementById('resultOverlay');
  var box = document.getElementById('resultBox');
  var icon = document.getElementById('resultIcon');
  var title = document.getElementById('resultTitle');
  var desc = document.getElementById('resultDesc');

  overlay.classList.remove('hidden');
  box.className = 'result-box';

  if (result.won) {
    box.classList.add('win');
    icon.textContent = result.prize.icon || '🎉';
    title.textContent = '恭喜获得 ' + result.prize.name;
    title.className = 'result-title win';
    desc.textContent = '到店出示本页面即可使用，3天内有效~';
  } else {
    icon.textContent = '😅';
    title.textContent = '谢谢参与';
    title.className = 'result-title lose';
    desc.textContent = '今天运气差一点，明天再来试试吧~';
  }
}

function closeResult(){
  document.getElementById('resultOverlay').classList.add('hidden');
}

function showToast(msg){
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;z-index:200;pointer-events:none;transition:opacity .3s';
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity = '0'; }, 1800);
  setTimeout(function(){ document.body.removeChild(t); }, 2200);
}

init();
</script>
</body>
</html>
