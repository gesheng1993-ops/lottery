<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>逃跑抄手 · 幸运抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f4f7fc;color:#3e2723;min-height:100vh;overflow-x:hidden}
.page{max-width:500px;margin:0 auto;padding:0 0 30px}

.header{background:linear-gradient(135deg,#0D47A1,#1565C0);padding:20px;text-align:center;position:relative}
.header .back{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#fff;font-size:14px;text-decoration:none;opacity:.8}
.header .brand{font-size:12px;color:rgba(255,255,255,.7);letter-spacing:4px}
.header h1{font-size:20px;color:#fff;font-weight:700;margin:4px 0}
.header .sub{font-size:12px;color:rgba(255,255,255,.8)}

.status-bar{display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin:16px 0 12px;font-size:13px;color:#8d6e63}
.status-bar .count{font-weight:600;color:#1565C0}

/* 翻牌区域 */
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 20px;margin:0 auto;max-width:380px}
.card-wrap{perspective:600px;aspect-ratio:3/4}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;cursor:pointer}
.card-inner:active{transform:scale(.95)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-inner.disabled{pointer-events:none}
.card-front,.card-back{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.card-front{background:linear-gradient(135deg,#1565C0,#0D47A1);border:3px solid #90CAF9;color:#fff;font-size:28px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card-front .qmark{font-size:36px;font-weight:700;opacity:.9}
.card-back{background:#fff;border:3px solid #e0d5cc;transform:rotateY(180deg);flex-direction:column;gap:4px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card-back .c-icon{font-size:32px}
.card-back .c-name{font-size:11px;font-weight:600;color:#4e342e;text-align:center}
.card-back.win-card{border-color:#FFD700;background:#FFFDE7}
.card-back.lose-card{background:#f9f9f9}
.card-back .c-tag{font-size:10px;padding:2px 8px;border-radius:8px;background:#E3F2FD;color:#1565C0}

/* 结果弹窗 */
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.result-overlay.hidden{display:none}
.result-box{background:#fff;border-radius:20px;padding:32px 24px 24px;width:100%;max-width:320px;text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.result-box.win{border:3px solid #FFD700}
.result-icon{font-size:56px;margin-bottom:8px}
.result-title{font-size:20px;font-weight:700;margin-bottom:4px}
.result-title.win{color:#1565C0}
.result-title.lose{color:#8d6e63}
.result-desc{font-size:13px;color:#8d6e63;margin-bottom:16px;line-height:1.6}
.result-btn{display:inline-block;padding:10px 32px;border:none;border-radius:20px;background:#1565C0;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin:4px}
.result-btn:active{opacity:.85}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

.rules{background:#fff;border-radius:12px;margin:16px;padding:16px;font-size:12px;color:#8d6e63;line-height:1.8}
.rules h3{font-size:13px;color:#4e342e;margin-bottom:4px}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;z-index:200;pointer-events:none;transition:opacity .3s}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <a class="back" href="/">&larr; 返回</a>
    <div class="brand">· 逃跑抄手 ·</div>
    <h1>🎴 幸运翻牌</h1>
    <div class="sub">每日限量奖品 · 翻牌试试手气</div>
  </div>

  <div class="date-badge" style="text-align:center;margin:12px 0 4px">
    <span id="gameDate" style="display:inline-block;background:#fff;border:1px solid #e0d5cc;border-radius:20px;padding:6px 18px;font-size:12px;color:#8d6e63"></span>
  </div>

  <div class="status-bar">
    <span>今日剩余：<span class="count" id="remainCount">--</span> 次</span>
    <span id="poolHint" style="font-size:11px"></span>
  </div>

  <div style="text-align:center;margin-bottom:12px;font-size:13px;color:#8d6e63">
    👆 点击一张牌翻开
  </div>

  <!-- 8张卡片 -->
  <div class="cards-grid" id="cardsGrid"></div>

  <div class="rules">
    <h3>📋 活动规则</h3>
    1. 每日可参与 <strong>1次</strong> 翻牌<br>
    2. 奖品每日限量，先到先得<br>
    3. 中奖后<strong>3天内</strong>有效，到店出示即可使用<br>
    4. 每日限<strong>50人</strong>参与，人满即止<br>
    5. 最终解释权归逃跑抄手所有
  </div>
</div>

<div class="result-overlay hidden" id="resultOverlay">
  <div class="result-box" id="resultBox">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="result-btn" onclick="closeResult()">知道了</button>
  </div>
</div>

<script>
var API_BASE = '';
var STATE = {
  userId: '',
  poolStatus: null,
  userDrawCount: 0,
  maxDraws: 1,
  isDrawing: false
};

var CARD_PRIZES = [
  {icon:'🎉', name:'20元代金券', color:'#FF4444', isWin:true, level:1},
  {icon:'🍲', name:'任意小菜一份', color:'#FFD700', isWin:true, level:2},
  {icon:'🍲', name:'任意小菜一份', color:'#FFD700', isWin:true, level:2},
  {icon:'😅', name:'谢谢参与', color:'#bcaaa4', isWin:false},
  {icon:'😅', name:'谢谢参与', color:'#bcaaa4', isWin:false},
  {icon:'😅', name:'谢谢参与', color:'#bcaaa4', isWin:false},
  {icon:'😅', name:'谢谢参与', color:'#bcaaa4', isWin:false},
  {icon:'😅', name:'谢谢参与', color:'#bcaaa4', isWin:false}
];

function init(){
  var params = new URLSearchParams(window.location.search);
  STATE.userId = params.get('uid') || localStorage.getItem('_luid') || '';

  if (!STATE.userId) {
    window.location.href = '/';
    return;
  }

  var d = new Date();
  var week = ['日','一','二','三','四','五','六'];
  document.getElementById('gameDate').textContent =
    d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日 · 星期' + week[d.getDay()];

  renderCards();
  loadStatus();
}

function renderCards(){
  var html = '';
  // 洗牌：随机排列
  var shuffled = CARD_PRIZES.slice().sort(function(){ return Math.random() - 0.5; });
  window._shuffled = shuffled;
  for (var i = 0; i < shuffled.length; i++) {
    html += '<div class="card-wrap">' +
      '<div class="card-inner" id="card' + i + '" onclick="flipCard(' + i + ')">' +
        '<div class="card-front"><span class="qmark">?</span></div>' +
        '<div class="card-back ' + (shuffled[i].isWin ? 'win-card' : 'lose-card') + '">' +
          '<span class="c-icon">' + shuffled[i].icon + '</span>' +
          '<span class="c-name">' + shuffled[i].name + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('cardsGrid').innerHTML = html;
}

function loadStatus(){
  Promise.all([
    fetch(API_BASE+'/api/pool-status').then(function(r){return r.json()}),
    fetch(API_BASE+'/api/user-status?user_id=' + encodeURIComponent(STATE.userId)).then(function(r){return r.json()})
  ]).then(function(results){
    var poolData = results[0];
    var userData = results[1];
    if (poolData.code === 0) STATE.poolStatus = poolData.data;
    if (userData.code === 0) {
      STATE.userDrawCount = userData.data.draw_count;
      STATE.maxDraws = userData.data.max_draws;
    }
    updateUI();
  }).catch(function(e){
    console.error('Status error:', e);
  });
}

function updateUI(){
  var remaining = Math.max(0, STATE.maxDraws - STATE.userDrawCount);
  document.getElementById('remainCount').textContent = remaining;

  var hintEl = document.getElementById('poolHint');
  if (STATE.poolStatus && !STATE.poolStatus.has_prizes) {
    hintEl.textContent = '今日奖品已抽完';
    hintEl.style.color = '#ef4444';
  } else {
    hintEl.textContent = '奖品还有剩余';
    hintEl.style.color = '#10b981';
  }

  if (remaining <= 0) {
    document.querySelectorAll('.card-inner').forEach(function(el){ el.classList.add('disabled'); });
  }
}

function flipCard(idx){
  if (STATE.isDrawing) return;
  var remaining = Math.max(0, STATE.maxDraws - STATE.userDrawCount);
  if (remaining <= 0) {
    showToast('今日翻牌次数已用完');
    return;
  }

  STATE.isDrawing = true;
  document.querySelectorAll('.card-inner').forEach(function(el){ el.classList.add('disabled'); });

  fetch(API_BASE+'/api/draw?user_id=' + encodeURIComponent(STATE.userId))
  .then(function(r){ return r.json(); })
  .then(function(data){
    if (data.code === 429) {
      showToast(data.message);
      STATE.isDrawing = false;
      loadStatus();
      renderCards();
      return;
    }
    if (data.code !== 0) {
      showToast(data.message || '翻牌失败');
      STATE.isDrawing = false;
      loadStatus();
      renderCards();
      return;
    }

    var result = data.data;
    // 根据结果调度翻转动画
    animateReveal(idx, result, function(){
      STATE.isDrawing = false;
      STATE.userDrawCount++;
      updateUI();
      showResult(result);
    });
  })
  .catch(function(err){
    showToast('网络错误: ' + (err.message || '连接失败'));
    console.error('Draw error:', err);
    STATE.isDrawing = false;
    loadStatus();
    renderCards();
  });
}

function animateReveal(clickedIdx, result, callback){
  // 先翻用户选的牌
  var selectedEl = document.getElementById('card' + clickedIdx);
  var shuffled = window._shuffled;
  var realIdx;

  // 在实际洗牌结果中找到匹配的卡片位置
  if (result.won && result.prize.level === 1) {
    // 找20元代金券的位置
    realIdx = shuffled.findIndex(function(c){ return c.level === 1; });
  } else if (result.won && result.prize.level === 2) {
    // 找小菜的位置
    realIdx = shuffled.findIndex(function(c){ return c.level === 2; });
  } else {
    // 找谢谢参与的位置
    realIdx = shuffled.findIndex(function(c){ return !c.isWin; });
  }

  // 如果点中的卡恰好是正确位置，直接翻
  // 如果不是，把选中位置的卡换成正确结果
  if (clickedIdx !== realIdx && realIdx >= 0) {
    shuffled[clickedIdx] = shuffled[realIdx];
    // 更新那个位置的卡背
    var cb = document.getElementById('card' + clickedIdx).querySelector('.card-back');
    cb.querySelector('.c-icon').textContent = shuffled[clickedIdx].icon;
    cb.querySelector('.c-name').textContent = shuffled[clickedIdx].name;
    cb.className = 'card-back ' + (shuffled[clickedIdx].isWin ? 'win-card' : 'lose-card');
  }

  selectedEl.classList.add('flipped');

  // 延迟后翻其他牌
  setTimeout(function(){
    for (var i = 0; i < 8; i++) {
      if (i !== clickedIdx) {
        (function(j){
          setTimeout(function(){
            document.getElementById('card' + j).classList.add('flipped');
          }, (j < clickedIdx ? j : j - 1) * 150);
        })(i);
      }
    }
    // 全部翻完后显示结果
    setTimeout(function(){ callback(); }, 1500);
  }, 800);
}

function showResult(result){
  var overlay = document.getElementById('resultOverlay');
  var box = document.getElementById('resultBox');
  var icon = document.getElementById('resultIcon');
  var title = document.getElementById('resultTitle');
  var desc = document.getElementById('resultDesc');

  overlay.classList.remove('hidden');
  box.className = 'result-box';

  if (result.won) {
    box.classList.add('win');
    icon.textContent = result.prize.icon || '🎉';
    title.textContent = '恭喜获得 ' + result.prize.name;
    title.className = 'result-title win';
    desc.textContent = '到店出示本页面即可使用，3天内有效~';
  } else {
    icon.textContent = '😅';
    title.textContent = '谢谢参与';
    title.className = 'result-title lose';
    desc.textContent = '今天运气差一点，明天再来试试吧~';
  }
}

function closeResult(){
  document.getElementById('resultOverlay').classList.add('hidden');
  renderCards();
  loadStatus();
}

function showToast(msg){
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity = '0'; }, 1800);
  setTimeout(function(){ document.body.removeChild(t); }, 2200);
}

init();
</script>
</body>
</html>
